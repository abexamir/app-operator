name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit install.yaml + create releases
      packages: write   # push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

      - name: Build and push apiserver image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.apiserver
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}-apiserver:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}-apiserver:sha-${{ github.sha }}
          cache-from: type=gha,scope=apiserver
          cache-to: type=gha,mode=max,scope=apiserver

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ui
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}-ui:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}-ui:sha-${{ github.sha }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Install kustomize
        run: make kustomize

      - name: Generate dist/install.yaml
        run: |
          make build-installer \
            IMG=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }} \
            APISERVER_IMG=ghcr.io/${{ github.repository }}-apiserver:${{ steps.tag.outputs.value }} \
            UI_IMG=ghcr.io/${{ github.repository }}-ui:${{ steps.tag.outputs.value }}
          git checkout config/manager/kustomization.yaml config/apiserver/kustomization.yaml config/ui/kustomization.yaml

      # On pushes to main: commit dist/install.yaml so the raw URL always reflects latest
      - name: Commit dist/install.yaml to main
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/install.yaml
          git diff --staged --quiet || (
            git commit -m "chore: update dist/install.yaml [skip ci]" &&
            git push
          )

      # On version tags: create a GitHub Release with install.yaml attached
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
          generate_release_notes: true
