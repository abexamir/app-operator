# This rule is not used by the project appoperator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to appdefinition.abexamir.me resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: appoperator
    app.kubernetes.io/managed-by: kustomize
  name: appdefinition-viewer-role
rules:
- apiGroups:
  - appdefinition.abexamir.me
  resources:
  - appdefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - appdefinition.abexamir.me
  resources:
  - appdefinitions/status
  verbs:
  - get
