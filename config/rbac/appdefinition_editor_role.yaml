# This rule is not used by the project appoperator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the appdefinition.abexamir.me.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: appoperator
    app.kubernetes.io/managed-by: kustomize
  name: appdefinition-editor-role
rules:
- apiGroups:
  - appdefinition.abexamir.me
  resources:
  - appdefinitions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - appdefinition.abexamir.me
  resources:
  - appdefinitions/status
  verbs:
  - get
