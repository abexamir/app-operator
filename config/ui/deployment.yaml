apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-operator-ui
  namespace: appoperator-system
  labels:
    app.kubernetes.io/name: app-operator-ui
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-operator-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-operator-ui
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: ui
          image: ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
