                  B — OpenTelemetry Operator + PodLogs CRD (closest to ServiceMonitor)\n\n\tThe
                  OTel Operator introduces a PodLogs CRD. The operator can create
                  a\n\tPodLogs object (via unstructured, same pattern as ServiceMonitor)
