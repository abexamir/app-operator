apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: lifecycle-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Demonstrates both postStart and preStop lifecycle hooks for graceful startup and shutdown."
spec:
  containers:
    - name: web
      image: nginx:1.25-alpine
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
  replicas: 2
  lifecycle:
    # postStart runs immediately after the container starts.
    # Note: the container may not be fully ready yet at this point.
    # Here we write a startup marker file.
    postStart:
      exec:
        command: ["/bin/sh", "-c", "echo started > /tmp/started && date >> /tmp/started"]
    # preStop runs before the container receives SIGTERM.
    # Sleep gives in-flight requests time to complete (connection draining).
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 5 && nginx -s quit"]
  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
