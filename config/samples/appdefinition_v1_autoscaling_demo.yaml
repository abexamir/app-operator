apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: autoscaling-demo
  namespace: apps
spec:
  source:
    type: dockerImage
    dockerImage:
      containers:
        - name: web
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
              servicePort: 80
              protocol: TCP
              expose: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            type: httpGet
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
  # replicas is used as minReplicas when autoscaling is enabled
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
