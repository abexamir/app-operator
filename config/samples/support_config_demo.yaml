apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
  namespace: apps
data:
  APP_COLOR: "blue"
  MAX_CONNECTIONS: "100"
  config.json: |
    {
      "debug": false,
      "port": 80,
      "logLevel": "info"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
  namespace: apps
type: Opaque
stringData:
  DB_PASSWORD: "super-secret-password"
  API_KEY: "my-api-key-12345"
  credentials.json: |
    {
      "username": "app-user",
      "password": "super-secret-password"
    }
