apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: multi-config-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Multiple ConfigMaps and Secrets, covering all three secret usage modes: env vars only, file mount only, and both simultaneously."
spec:
  containers:
    - name: web
      image: nginx:1.25-alpine
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5

  replicas: 1

  # --- Multiple ConfigMaps ---

  configMaps:
    # ConfigMap 1: nginx virtual host config.
    # Operator creates "multi-config-demo-nginx-config" and mounts at /etc/nginx/conf.d.
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
      data:
        default.conf: |
          server {
            listen 80;
            server_name _;
            location / {
              root /usr/share/nginx/html;
              index index.html;
              add_header X-App multi-config-demo;
            }
            location /healthz {
              return 200 "ok\n";
              add_header Content-Type text/plain;
            }
          }

    # ConfigMap 2: application feature flags.
    # Operator creates "multi-config-demo-feature-flags" and mounts at /etc/app/flags.
    - name: feature-flags
      mountPath: /etc/app/flags
      data:
        flags.yaml: |
          features:
            dark_mode: true
            beta_api: false
            rate_limiting: true
            max_connections: 500

    # ConfigMap 3: static HTML content.
    - name: html-content
      mountPath: /usr/share/nginx/html
      data:
        index.html: |
          <!DOCTYPE html>
          <html>
          <body>
            <h1>multi-config-demo</h1>
            <p>Served by nginx with inline ConfigMaps and Secrets.</p>
          </body>
          </html>

  # --- Multiple Secrets (all three usage modes) ---

  secrets:
    # Mode 1: asEnvVars only — no mountPath. Keys become env vars in all containers.
    # Operator creates "multi-config-demo-db-credentials".
    - name: db-credentials
      asEnvVars: true
      data:
        DB_HOST: "postgres.apps.svc.cluster.local"
        DB_PORT: "5432"
        DB_NAME: "appdb"
        DB_USER: "appuser"
        DB_PASSWORD: "s3cur3-db-p@ss"

    # Mode 2: mountPath only — no asEnvVars. Keys become files at /etc/tls.
    # Useful for TLS certificates or binary data that can't be env vars.
    - name: tls-certs
      mountPath: /etc/tls
      data:
        ca.crt: |
          -----BEGIN CERTIFICATE-----
          MIIBVzCCAQCgAwIBAgIUExample...
          -----END CERTIFICATE-----
        client.crt: |
          -----BEGIN CERTIFICATE-----
          MIIBVzCCAQCgAwIBAgIUExample...
          -----END CERTIFICATE-----
        client.key: |
          -----BEGIN RSA PRIVATE KEY-----
          MIIEowIBAAKCAQEAExample...
          -----END RSA PRIVATE KEY-----

    # Mode 3: both asEnvVars AND mountPath — keys are injected as env vars AND
    # written as files at /etc/app/secrets. Use when code reads both ways.
    - name: api-keys
      mountPath: /etc/app/secrets
      asEnvVars: true
      data:
        STRIPE_SECRET_KEY: "sk_test_ExampleKey12345"
        SENDGRID_API_KEY: "SG.ExampleKey.12345"
        INTERNAL_API_TOKEN: "tok_example_internal"

  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
