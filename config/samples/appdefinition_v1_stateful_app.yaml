apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: stateful-app
  namespace: default
spec:
  initContainers:
    - name: init-data
      image: docker.zarrino.tech/busybox:1.36
      command: ["/bin/sh", "-c", "mkdir -p /data /logs"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"

  containers:
    - name: db
      image: docker.zarrino.tech/postgres:16
      env:
        # Tell postgres to use the mounted PVC as its data directory.
        # Without PGDATA, postgres defaults to /var/lib/postgresql/data (inside
        # the container image) and cannot chmod it when running as non-root.
        - name: PGDATA
          value: /data
      ports:
        - name: postgres
          containerPort: 5432
          servicePort: 5432
          expose: true
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "2Gi"
      readinessProbe:
        type: exec
        exec:
          command: ["pg_isready", "-U", "app"]
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 6
      livenessProbe:
        type: tcpSocket
        tcpSocket:
          port: 5432
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

  # disk forces replicas: 1 — ReadWriteOnce PVCs allow a single writer
  replicas: 1
  # paused: true  # uncomment to suspend all reconciliation during maintenance

  disk:
    sizeInGi: 20
    storageClassName: local-path
    setFsGroup: true   # injects securityContext.fsGroup so the PVC is group-writable
    # protect: true  # uncomment while migrating the PVC — prevents recreation if the PVC
    #                # is absent; annotation updates and size expansion still apply normally
    partitions:
      - mountPath: /data
        subPath: data
      - mountPath: /logs
        subPath: logs
    annotations:
      backup.velero.io/backup-volumes: "stateful-app-disk"
      snapshot.storage.kubernetes.io/allow-volume-snapshot: "true"

  configMaps:
    - name: server-config
      mountPath: /etc/postgresql
      data:
        postgresql.conf: |
          max_connections = 100
          shared_buffers = 128MB
          log_min_duration_statement = 1000
    - name: init-scripts
      mountPath: /docker-entrypoint-initdb.d
      data:
        01-schema.sql: |
          CREATE TABLE IF NOT EXISTS events (id bigserial PRIMARY KEY, payload jsonb);

  secrets:
    # inline: mount as files only
    - name: tls-certs
      mountPath: /etc/tls
      data:
        tls.crt: "LS0tLS1CRUdJTi..."
        tls.key: "LS0tLS1CRUdJTi..."

    # inline: inject as env vars only
    - name: db-creds
      asEnvVars: true
      data:
        POSTGRES_PASSWORD: "changeme"
        POSTGRES_USER: "app"

    # inline: mount as files AND inject as env vars
    - name: api-keys
      mountPath: /etc/keys
      asEnvVars: true
      data:
        API_KEY: "abc123"
        API_SECRET: "xyz789"

  securityContext:
    # fsGroup ensures the PVC is group-writable by the postgres GID (999 on Debian postgres:16).
    # Do NOT set runAsUser/runAsNonRoot here — the postgres entrypoint must start as root
    # to chown/chmod PGDATA, then internally gosu's to the postgres user (UID 999).
    fsGroup: 999
