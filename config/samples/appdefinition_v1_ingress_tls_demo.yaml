apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: ingress-tls-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Ingress with multiple domains, TLS termination, redirect, cert-manager issuer, and custom ingress annotations."
spec:
  containers:
    - name: web
      image: traefik/whoami:latest
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /health
          port: 80
        initialDelaySeconds: 2
        periodSeconds: 5
    - name: api
      image: traefik/whoami:latest
      command: ["whoami"]
      args: ["--port=8080", "--name=api"]
      ports:
        - name: api
          containerPort: 8080
          servicePort: 8080
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5

  replicas: 2

  serviceType: ClusterIP
  ingressClass: traefik

  # Multiple domains routed to different container ports.
  # TLS is enabled with cert-manager for automated certificate provisioning.
  domains:
    - name: app.demo.local
      path: /
      tls: false
      portName: http

    - name: api.demo.local
      path: /
      tls: false
      portName: api

    # TLS example — requires cert-manager installed in the cluster.
    # The secretName is auto-generated as "ingress-tls-demo-app-example-com-tls" if not set.
    # - name: app.example.com
    #   path: /
    #   tls: true
    #   redirect_tls: true
    #   certIssuer: letsencrypt-prod
    #   portName: http
    #   annotations:
    #     cert-manager.io/cluster-issuer: letsencrypt-prod

  ingressAnnotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
