apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: private-registry-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Pull container images from a private registry using imagePullSecrets. The referenced secret must exist in the same namespace."
spec:
  containers:
    - name: app
      # Replace with your actual private registry image.
      image: registry.example.com/myorg/myapp:v1.0.0
      ports:
        - name: http
          containerPort: 8080
          servicePort: 8080
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 5
      livenessProbe:
        type: httpGet
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 20
  replicas: 2
  # imagePullSecrets references a pre-created docker-registry Secret in the same namespace.
  # Create it with:
  #   kubectl create secret docker-registry my-registry-creds \
  #     --docker-server=registry.example.com \
  #     --docker-username=<user> \
  #     --docker-password=<password> \
  #     -n apps
  imagePullSecrets:
    - name: my-registry-creds
  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
