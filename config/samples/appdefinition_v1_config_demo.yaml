apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: config-demo
  namespace: apps
spec:
  source:
    type: dockerImage
    dockerImage:
      containers:
        - name: web
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
              servicePort: 80
              protocol: TCP
              expose: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            type: httpGet
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
  replicas: 1
  configMaps:
    - name: demo-config
      mountPath: /etc/app-config
  secrets:
    - name: demo-secret
      mountPath: /etc/app-secrets
  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
