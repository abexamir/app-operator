apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: config-demo
  namespace: apps
spec:
  containers:
    - name: web
      image: nginx:1.25-alpine
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
  replicas: 1
  # Inline ConfigMap: operator creates "config-demo-nginx-config" and mounts it.
  configMaps:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
      data:
        default.conf: |
          server {
            listen 80;
            server_name _;
            location / {
              root /usr/share/nginx/html;
              index index.html;
              add_header X-Served-By config-demo;
            }
            location /healthz {
              return 200 "ok\n";
              add_header Content-Type text/plain;
            }
          }
  # Inline Secret: operator creates "config-demo-app-secrets".
  # asEnvVars injects DB_PASSWORD and API_KEY into the container as env vars.
  # mountPath also makes them available as files at /etc/secrets/.
  secrets:
    - name: app-secrets
      mountPath: /etc/secrets
      asEnvVars: true
      data:
        DB_PASSWORD: "super-secret-password"
        API_KEY: "my-api-key-12345"
  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
