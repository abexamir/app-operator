apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: platform-ops
  namespace: default
spec:
  containers:
    - name: app
      image: docker.zarrino.tech/nginxinc/nginx-unprivileged:alpine
      ports:
        - name: http
          containerPort: 8080
          servicePort: 80
          expose: true
        # metrics port is scraped by Prometheus directly; not added to the Service
        - name: metrics
          containerPort: 9090
          servicePort: 9090
          expose: false
          metricsPath: /metrics
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "512Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

    # Prometheus exporter sidecar — collects host/runtime metrics alongside the app
    - name: metrics-exporter
      image: docker.zarrino.tech/prom/node-exporter:v1.8.0
      ports:
        - name: node-metrics
          containerPort: 9100
          servicePort: 9100
          expose: false
          metricsPath: /metrics
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"

    # TCP-only sidecar — no HTTP layer; protocol: TCP skips HTTP health check assumptions
    - name: tcp-proxy
      image: docker.zarrino.tech/busybox:1.36
      command: ["/bin/sh", "-c", "while true; do nc -l -p 3000 -w 3600; done"]
      ports:
        - name: proxy
          containerPort: 3000
          servicePort: 3000
          expose: true
          protocol: TCP
      readinessProbe:
        type: tcpSocket
        tcpSocket:
          port: 3000
        initialDelaySeconds: 3
        periodSeconds: 5
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"

  replicas: 2

  # LoadBalancer provisions a cloud LB and assigns an external IP; use ClusterIP for internal-only
  serviceType: LoadBalancer

  # Creates a ServiceMonitor (monitoring.coreos.com/v1); silently skipped without prometheus-operator
  monitoringConfig:
    enabled: true
    scrapeInterval: "15s"
    labels:
      release: prometheus-stack   # must match your Prometheus serviceMonitorSelector

  loggingConfig:
    stdout:
      enabled: true
      format: json
    stderr:
      enabled: true
      format: json
    files:
      - path: /var/log/app/access.log
        format: json
      - path: /var/log/app/error.log
        format: text
        multilinePattern: "^\\d{4}-\\d{2}-\\d{2}"

  # paused: true  # uncomment to suspend reconciliation without deleting resources
