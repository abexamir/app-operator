apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: sample-app
spec:
  source:
    type: dockerImage
    dockerImage:
      containers:
        - name: web
          image: nginx:latest
          ports:
            - name: http
              containerPort: 80
              servicePort: 80
              protocol: TCP
              expose: true
  domains:
    - name: example.com
      path: /
      tls: true