apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: sample-app
  namespace: default
spec:
  containers:
    - name: web
      image: nginx:latest
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
  replicas: 1
  serviceType: ClusterIP
