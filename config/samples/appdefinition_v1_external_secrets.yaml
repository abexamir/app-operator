apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: eso-app
  namespace: default
spec:
  initContainers:
    # ESO sync is async — wait until the Secret exists before starting the main container
    - name: wait-secrets
      image: busybox:1.36
      command: ["/bin/sh", "-c", "until [ -f /etc/db/DB_PASSWORD ]; do sleep 2; done"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"

  containers:
    - name: app
      image: my-app:v1.0.0
      ports:
        - name: http
          containerPort: 8080
          servicePort: 80
          expose: true
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10

  replicas: 2

  configMaps:
    - name: app-config
      mountPath: /etc/config
      data:
        config.yaml: |
          log_level: info

  # Requires External Secrets Operator. Silently skipped if ESO CRDs are not installed.
  # Each entry creates an ExternalSecret; ESO syncs it into a Kubernetes Secret named
  # "<app>-<name>" which the operator then mounts or injects like any inline secret.
  externalSecrets:
    # Fetch specific keys from a Vault KV store via ClusterSecretStore (cluster-wide)
    - name: db-creds
      store: vault-cluster
      storeKind: ClusterSecretStore
      refreshInterval: "1h"
      asEnvVars: true              # inject DB_PASSWORD and DB_HOST as env vars
      mountPath: /etc/db           # also mount as files — readable by the init container above
      data:
        - secretKey: DB_PASSWORD
          remoteRef:
            key: secret/data/myapp/db
            property: password
        - secretKey: DB_HOST
          remoteRef:
            key: secret/data/myapp/db
            property: host
            version: "3"           # pin to a specific secret version; omit for latest

    # Bulk-import an entire secret path and mount every key as a file
    - name: tls-bundle
      store: vault-cluster
      storeKind: ClusterSecretStore
      refreshInterval: "24h"
      mountPath: /etc/tls          # all keys in the remote secret become files under /etc/tls/
      dataFrom:
        - key: secret/data/myapp/tls

    # Namespace-scoped SecretStore; combines data and dataFrom in one ExternalSecret
    - name: api-secrets
      store: local-ssm
      storeKind: SecretStore       # SecretStore is namespace-scoped; ClusterSecretStore is cluster-wide
      refreshInterval: "30m"
      asEnvVars: true
      data:
        - secretKey: API_KEY
          remoteRef:
            key: /prod/myapp/api-key
      dataFrom:
        - key: /prod/myapp/shared-config
