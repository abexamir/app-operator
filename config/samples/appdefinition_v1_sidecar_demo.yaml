apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: sidecar-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Sidecar pattern: main nginx app with a log-shipping sidecar and a metrics exporter sidecar. All three containers share the same pod."
spec:
  containers:
    # Main application container.
    - name: web
      image: nginx:1.25-alpine
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      env:
        - name: NGINX_HOST
          value: "sidecar-demo"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
      livenessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 15

    # Sidecar 1: nginx-prometheus-exporter scrapes nginx stub_status and exposes /metrics.
    - name: metrics-exporter
      image: nginx/nginx-prometheus-exporter:1.1
      args: ["-nginx.scrape-uri=http://localhost/stub_status"]
      ports:
        - name: metrics
          containerPort: 9113
          servicePort: 9113
          protocol: TCP
          expose: true
          metricsPath: /metrics
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /metrics
          port: 9113
        initialDelaySeconds: 5
        periodSeconds: 10

    # Sidecar 2: log shipper that tails a shared log volume and prints to stdout.
    # In production this would be Fluentd, Filebeat, or Vector.
    - name: log-shipper
      image: busybox:stable
      command: ["/bin/sh", "-c"]
      args:
        - |
          mkdir -p /var/log/nginx
          touch /var/log/nginx/access.log /var/log/nginx/error.log
          tail -F /var/log/nginx/access.log /var/log/nginx/error.log
      resources:
        requests:
          cpu: "5m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"
      readinessProbe:
        type: exec
        exec:
          command: ["/bin/sh", "-c", "test -f /var/log/nginx/access.log"]
        initialDelaySeconds: 2
        periodSeconds: 10

  replicas: 2

  configMaps:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
      data:
        default.conf: |
          server {
            listen 80;
            server_name _;
            location / {
              root /usr/share/nginx/html;
              index index.html;
            }
            location /stub_status {
              stub_status;
              allow 127.0.0.1;
              deny all;
            }
          }

  monitoringConfig:
    enabled: true
    scrapeInterval: "15s"
    labels:
      app.kubernetes.io/name: sidecar-demo
      app.kubernetes.io/component: web

  loggingConfig:
    stdout:
      enabled: true
      format: json
    stderr:
      enabled: true
      format: json

  serviceType: LoadBalancer
  securityContext:
    runAsNonRoot: false
