apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: complex-app
  namespace: default
spec:
  # Source configuration with multiple containers
  source:
    type: dockerImage
    dockerImage:
      containers:
        # Main web application container
        - name: web
          image: nginx:1.25-alpine
          command: ["nginx"]
          args: ["-g", "daemon off;"]
          ports:
            - name: http
              containerPort: 80
              servicePort: 80
              protocol: TCP
              expose: true
              metricsPath: /metrics
          env:
            - name: NGINX_HOST
              value: "example.com"
            - name: NGINX_PORT
              value: "80"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            type: httpGet
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            type: httpGet
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1

        # Sidecar container for metrics collection
        - name: metrics
          image: prom/prometheus:v2.45.0
          command: ["prometheus"]
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - name: metrics
              containerPort: 9090
              servicePort: 9090
              protocol: TCP
              expose: true
              metricsPath: /metrics
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            type: httpGet
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            type: httpGet
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20

  # Scaling configuration
  replicas: 3

  # Domain configuration with TLS
  domains:
    - name: app.example.com
      path: /
      tls: true
      redirect_tls: true
      certIssuer: letsencrypt-prod
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
    - name: metrics.app.example.com
      path: /
      tls: true
      certIssuer: letsencrypt-prod
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod

  # Persistent storage configuration
  disk:
    sizeInGi: 10
    storageClassName: standard
    setFsGroup: true
    partitions:
      - mountPath: /data
        subPath: data
      - mountPath: /logs
        subPath: logs

  # Logging configuration
  loggingConfig:
    stdout:
      enabled: true
      format: json
    stderr:
      enabled: true
      format: json
    files:
      - path: /logs/app.log
        format: json
        multilinePattern: "^\\d{4}-\\d{2}-\\d{2}"

  # Monitoring configuration
  monitoringConfig:
    enabled: true
    scrapeInterval: "30s"
    labels:
      app.kubernetes.io/name: complex-app
      app.kubernetes.io/instance: complex-app
      app.kubernetes.io/component: web

  # Pod configuration
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true

  # Service configuration
  serviceType: ClusterIP

  # Ingress configuration
  ingressAnnotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"