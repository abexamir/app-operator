apiVersion: appdefinition.abexamir.me/v1
kind: AppDefinition
metadata:
  name: probes-demo
  namespace: apps
  annotations:
    app.kubernetes.io/description: "Demonstrates all three probe types: httpGet, tcpSocket, and exec."
spec:
  containers:
    # Container 1: httpGet probes — most common for HTTP services.
    - name: web
      image: nginx:1.25-alpine
      ports:
        - name: http
          containerPort: 80
          servicePort: 80
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      readinessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
        successThreshold: 1
      livenessProbe:
        type: httpGet
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 3
        failureThreshold: 5

    # Container 2: tcpSocket probes — for non-HTTP TCP services.
    # Uses traefik/whoami which listens on TCP, probed via socket connection.
    - name: api
      image: traefik/whoami:latest
      ports:
        - name: api
          containerPort: 8080
          servicePort: 8080
          protocol: TCP
          expose: true
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
      readinessProbe:
        type: tcpSocket
        tcpSocket:
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      livenessProbe:
        type: tcpSocket
        tcpSocket:
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 20
        failureThreshold: 5

    # Container 3: exec probes — for custom health check scripts inside the container.
    - name: worker
      image: busybox:stable
      command: ["/bin/sh", "-c"]
      args:
        - |
          touch /tmp/healthy
          while true; do
            sleep 30
            echo "worker alive at $(date)"
          done
      resources:
        requests:
          cpu: "5m"
          memory: "8Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
      readinessProbe:
        type: exec
        exec:
          command: ["/bin/sh", "-c", "test -f /tmp/healthy"]
        initialDelaySeconds: 2
        periodSeconds: 5
        failureThreshold: 3
      livenessProbe:
        type: exec
        exec:
          command: ["/bin/sh", "-c", "test -f /tmp/healthy && find /tmp/healthy -mmin -5"]
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3

  replicas: 1
  serviceType: ClusterIP
